<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flujo de Caja - Dashboard Corporativo</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="styles.css?v=1.1">
    <script src="menu.js"></script>
</head>
<body>

    <!-- Menú Lateral / Sidebar -->
    <aside class="sidebar" id="sidebar-container"></aside>

    <!-- Contenido Principal -->
    <main class="main-content">
        <!-- Barra Superior -->
        <header class="top-bar" style="flex-wrap: wrap;">
            <h1 class="page-title">Flujo de Caja <span style="font-size: 1rem; color: var(--text-secondary); font-weight: normal; font-family: monospace;">(Expresado en MM $)</span></h1>
            <div id="filtros-container"></div>
        </header>

        <!-- Tarjetas de Resumen -->
        <div class="summary-cards" id="summary-cards" style="display: none; gap: 20px; margin-bottom: 25px;">
            <div class="summary-card" style="flex: 1; background: var(--surface-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 4px solid var(--primary-color);">
                <div class="card-title" style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 10px;">Total Ingresos de Caja</div>
                <div class="card-value" id="card-ingresos" style="font-size: 1.8rem; font-weight: 700; color: var(--primary-color);">0,00</div>
            </div>
            <div class="summary-card accent" style="flex: 1; background: var(--surface-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 4px solid #ef4444;">
                <div class="card-title" style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 10px;">Total Egresos de Caja</div>
                <div class="card-value" id="card-egresos" style="font-size: 1.8rem; font-weight: 700; color: #ef4444;">0,00</div>
            </div>
            <div class="summary-card" style="flex: 1; background: var(--surface-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 4px solid var(--secondary-color);">
                <div class="card-title" style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 10px;">Flujo Neto de Caja</div>
                <div class="card-value" id="card-neto" style="font-size: 1.8rem; font-weight: 700; color: var(--secondary-color);">0,00</div>
            </div>
        </div>

        <!-- Panel de Datos -->
        <section class="dashboard-panel">
            <div class="panel-header">
                <h3>Detalle de Flujo de Caja <span style="font-size: 0.9rem; color: var(--text-secondary); font-weight: normal; font-family: monospace;">(Expresado en MM $)</span></h3>
            </div>
            
            <!-- Mensajes de Estado -->
            <div id="error-message" class="error-message hidden"></div>
            <div id="loading" class="loading">Consultando datos en Supabase...</div>
            
            <!-- Tabla de Datos -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Concepto</th>
                            <th id="th-monto" style="text-align: right; width: 200px;">Monto</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Los datos se insertarán aquí dinámicamente -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Configuración y Lógica de la Aplicación -->
    <script src="config.js?v=1.1"></script>
    <script src="filtros.js?v=1.1"></script>
    <script src="fc_actual.js?v=1.1"></script>
</body>
</html>
