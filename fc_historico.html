<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flujo de Caja Histórico - Dashboard Corporativo</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="styles.css?v=1.1">
    <script src="menu.js"></script>
    <!-- Chart.js para el gráfico del modal -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sparkline-svg {
            display: inline-block;
            vertical-align: middle;
            width: 80px;
            height: 25px;
            cursor: pointer;
            transition: transform 0.2s;
            stroke: var(--primary-color);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            color: var(--primary-color);
        }
        .sparkline-svg:hover {
            transform: scale(1.1);
            stroke: var(--secondary-color);
            color: var(--secondary-color);
        }
        .sparkline-svg circle {
            fill: currentColor;
            transition: fill 0.2s;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: var(--surface-color);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <!-- Menú Lateral / Sidebar -->
    <aside class="sidebar" id="sidebar-container"></aside>

    <!-- Contenido Principal -->
    <main class="main-content">
        <!-- Barra Superior -->
        <header class="top-bar" style="flex-wrap: wrap;">
            <h1 class="page-title">Flujo de Caja Histórico <span style="font-size: 1rem; color: var(--text-secondary); font-weight: normal; font-family: monospace;">(Expresado en MM $)</span></h1>
            <div id="filtros-container"></div>
        </header>

        <!-- Tarjetas de Resumen -->
        <div class="summary-cards" id="summary-cards" style="display: none; gap: 20px; margin-bottom: 25px;">
            <div class="summary-card" style="flex: 1; background: var(--surface-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 4px solid var(--primary-color);">
                <div class="card-title" style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 10px;">Ingresos Acumulados (Periodo completo)</div>
                <div class="card-value" id="card-ingresos" style="font-size: 1.8rem; font-weight: 700; color: var(--primary-color);">0,00</div>
            </div>
            <div class="summary-card accent" style="flex: 1; background: var(--surface-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 4px solid #ef4444;">
                <div class="card-title" style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 10px;">Egresos Acumulados (Periodo completo)</div>
                <div class="card-value" id="card-egresos" style="font-size: 1.8rem; font-weight: 700; color: #ef4444;">0,00</div>
            </div>
            <div class="summary-card" style="flex: 1; background: var(--surface-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 4px solid var(--secondary-color);">
                <div class="card-title" style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 10px;">Flujo Neto Acumulado (Periodo completo)</div>
                <div class="card-value" id="card-neto" style="font-size: 1.8rem; font-weight: 700; color: var(--secondary-color);">0,00</div>
            </div>
        </div>

        <!-- Panel de Datos -->
        <section class="dashboard-panel">
            <div class="panel-header">
                <h3>Reporte Mensual Comparativo <span style="font-size: 0.9rem; color: var(--text-secondary); font-weight: normal; font-family: monospace;">(Expresado en MM $)</span></h3>
            </div>
            
            <!-- Mensajes de Estado -->
            <div id="error-message" class="error-message hidden"></div>
            <div id="loading" class="loading">Consultando datos en Supabase...</div>
            
            <!-- Tabla de Datos -->
            <div class="table-container" style="overflow-x: auto;">
                <table class="data-table" style="font-size: 0.9rem;">
                    <thead>
                        <tr id="table-header">
                            <!-- Columnas dinámicas de meses -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Los datos se insertarán aquí dinámicamente -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal para Detalle de Gráfica de Tendencia (Sparkline) -->
    <div id="sparkline-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="sparkline-modal-title" style="color: var(--text-primary); font-size: 1.1rem; margin: 0;">Detalle de Tendencia</h3>
                <button id="sparkline-modal-close" class="modal-close">&times;</button>
            </div>
            <div style="position: relative; height: 300px; width: 100%;">
                <canvas id="sparkline-modal-chart"></canvas>
            </div>
        </div>
    </div>

    <!-- Configuración y Lógica de la Aplicación -->
    <script src="config.js?v=1.1"></script>
    <script src="filtros.js?v=1.1"></script>
    <script src="fc_historico.js?v=1.1"></script>
</body>
</html>
