<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Administración de Conceptos FC - Corporación BEL</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="styles.css?v=1.1">
    <script src="menu.js"></script>
    <style>
        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background-color: var(--secondary-color);
        }
        
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            margin: 0 5px;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
        }
        .action-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .btn-edit { color: #3b82f6; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: var(--surface-color);
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 15px;
        }
        .modal-header h3 {
            margin: 0;
            font-size: 1.3rem;
            color: var(--primary-color);
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            background: var(--bg-color);
            color: var(--text-primary);
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 30px;
        }
        .btn-cancel {
            background-color: transparent;
            color: var(--text-secondary);
            border: 1px solid rgba(0,0,0,0.1);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn-cancel:hover {
            background-color: rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <!-- Menú Lateral / Sidebar -->
    <aside class="sidebar" id="sidebar-container"></aside>

    <!-- Contenido Principal -->
    <main class="main-content">
        <header class="top-bar">
            <h1 class="page-title">Gestión de Conceptos Flujo de Caja <span style="font-size: 1rem; color: var(--text-secondary); font-weight: normal; font-family: monospace;">(conceptosfc)</span></h1>
            <a href="admin.html" style="text-decoration: none; color: var(--text-secondary); font-weight: 500;">Volver al Panel</a>
        </header>

        <section class="dashboard-panel">
            <div class="table-controls">
                <h3>Conceptos Registrados</h3>
                <button class="btn-primary" id="btn-nuevo">
                    <span>+</span> Nuevo Concepto
                </button>
            </div>

            <!-- Mensajes -->
            <div id="error-message" class="error-message hidden"></div>
            <div id="success-message" class="success-message hidden" style="background-color: #dcfce7; color: #166534; padding: 15px; border-radius: 8px; margin-bottom: 20px;"></div>
            <div id="loading" class="loading">Cargando conceptos...</div>

            <!-- Tabla -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 80px; text-align: center;">Orden</th>
                            <th>Denominación</th>
                            <th>Clase / Categoría</th>
                            <th>Grupo</th>
                            <th>Subgrupo 1</th>
                            <th>Subgrupo 2</th>
                            <th style="text-align: center; width: 100px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Filas dinámicas -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal Formulario -->
    <div id="concepto-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Nuevo Concepto</h3>
                <button id="btn-close-modal" class="modal-close">&times;</button>
            </div>
            <form id="concepto-form">
                <input type="hidden" id="form-id">
                
                <div class="form-group">
                    <label for="form-orden">Orden (Número)</label>
                    <input type="number" id="form-orden" required min="1" placeholder="Ej: 1">
                </div>
                
                <div class="form-group">
                    <label for="form-denominacion">Denominación</label>
                    <input type="text" id="form-denominacion" required placeholder="Ej: INGRESOS POR VENTAS" autocomplete="off" style="text-transform: uppercase;">
                </div>

                <div class="form-group">
                    <label for="form-clase">Clase / Categoría</label>
                    <select id="form-clase" required>
                        <option value="">Selecciona una clase</option>
                        <option value="ACTIVIDADES DE OPERACIÓN">ACTIVIDADES DE OPERACIÓN</option>
                        <option value="ACTIVIDADES DE INVERSIÓN">ACTIVIDADES DE INVERSIÓN</option>
                        <option value="ACTIVIDADES DE FINANCIACIÓN">ACTIVIDADES DE FINANCIACIÓN</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="form-grupo">Grupo</label>
                    <input type="text" id="form-grupo" placeholder="Ej: INGRESOS DE OPERACIÓN" autocomplete="off" style="text-transform: uppercase;">
                </div>

                <div class="form-group">
                    <label for="form-subgrupo1">Subgrupo 1</label>
                    <input type="text" id="form-subgrupo1" placeholder="Ej: ENTRADAS DE EFECTIVO" autocomplete="off" style="text-transform: uppercase;">
                </div>

                <div class="form-group">
                    <label for="form-subgrupo2">Subgrupo 2</label>
                    <input type="text" id="form-subgrupo2" placeholder="Ej: RECAUDOS DE CLIENTES" autocomplete="off" style="text-transform: uppercase;">
                </div>

                <div class="form-actions">
                    <button type="button" id="btn-cancel-modal" class="btn-cancel">Cancelar</button>
                    <button type="submit" class="btn-primary" id="btn-save-modal">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Configuración y Lógica -->
    <script src="config.js?v=1.1"></script>
    <script src="admin_conceptosfc.js?v=1.1"></script>
</body>
</html>
