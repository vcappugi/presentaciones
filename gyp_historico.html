<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empresa 1 - Dashboard Corporativo</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="styles.css?v=1.1">
    <script src="menu.js"></script>
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- Menú Lateral / Sidebar -->
    <aside class="sidebar" id="sidebar-container"></aside>

    <!-- Contenido Principal -->
    <main class="main-content">
        <!-- Barra Superior -->
        <header class="top-bar" style="flex-wrap: wrap;">
            <h1 class="page-title">Histórico de G y P <span style="font-size: 1rem; color: var(--text-secondary); font-weight: normal; font-family: monospace;">(Expresado en MM $)</span></h1>
            <div id="filtros-container"></div>
        </header>

        <!-- Tarjetas de Resumen -->
        <div class="summary-cards" id="summary-cards" style="display: none; gap: 20px; margin-bottom: 25px;">
            <div class="summary-card" style="flex: 1; background: var(--surface-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 4px solid var(--primary-color);">
                <div class="card-title" style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 10px;">Resultado Neto</div>
                <div class="card-value" id="card-total-gyp" style="font-size: 1.8rem; font-weight: 700; color: var(--primary-color);">0,00</div>
            </div>
            <div class="summary-card accent" style="flex: 1; background: var(--surface-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 4px solid var(--accent-color);">
                <div class="card-title" style="font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 10px;">Margen de Utilidad Neta</div>
                <div class="card-value" id="card-porcentaje-ingresos" style="font-size: 1.8rem; font-weight: 700; color: var(--primary-color);">0,00 %</div>
            </div>
        </div>

        <!-- Gráfico Histórico -->
        <section class="dashboard-panel" style="margin-bottom: 25px;">
            <div class="panel-header" style="margin-bottom: 15px; padding-bottom: 10px;">
                <h3>Evolución Total GYP</h3>
            </div>
            <div style="position: relative; height: 150px; width: 100%;">
                <canvas id="gyp-chart"></canvas>
            </div>
        </section>

        <!-- Panel de Datos -->
        <section class="dashboard-panel">
            <div class="panel-header">
                <h3>Resumen Ganancias y Perdidas <span style="font-size: 0.9rem; color: var(--text-secondary); font-weight: normal; font-family: monospace;">(Expresado en MM $)</span></h3>
            </div>
            
            <!-- Mensajes de Estado -->
            <div id="error-message" class="error-message hidden"></div>
            <div id="loading" class="loading">Consultando datos en Supabase...</div>
            
            <!-- Tabla de Datos -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr id="table-header">
                            <!-- Las cabeceras se generarán dinámicamente -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Los datos se insertarán aquí dinámicamente -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Configuración y Lógica de la Aplicación -->
    <script src="config.js"></script>
    <script src="filtros.js"></script>
    <script src="gyp_historico.js"></script>
</body>
</html>
